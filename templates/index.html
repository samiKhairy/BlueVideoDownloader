<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluesky Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white shadow-xl rounded-xl p-8 max-w-lg w-full">
        <h1 class="text-3xl font-bold text-blue-700 text-center mb-6">
            Bluesky Video Downloader
        </h1>

        <div>
            <label class="block font-semibold text-blue-700 mb-2">Paste Bluesky Post URL</label>
            <input id="urlInput" type="text" placeholder="https://bsky.app/profile/.../post/..."
                class="w-full px-4 py-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-400" />
        </div>

        <button onclick="extractVideo()"
            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg">
            Get Download Links
        </button>

        <div id="results" class="hidden mt-6">
            <a id="videoBtn" href="#"
                class="block w-full text-center bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg mb-3"
                download>
                Download Video
            </a>

            <a id="thumbBtn" href="#"
                class="block w-full text-center bg-gray-600 hover:bg-gray-700 text-white py-3 rounded-lg" download>
                Download Thumbnail
            </a>

            <div class="mt-6 p-4 bg-blue-50 border border-blue-200 rounded-lg text-center">
                <p class="text-sm text-gray-700 font-medium">
                    ⚡ Download slow? Your ISP might be throttling social media.
                </p>
                <a href="YOUR_AFFILIATE_LINK_HERE" target="_blank"
                    class="mt-2 inline-block text-blue-600 font-bold hover:underline">
                    Boost Speed with NordVPN &rarr;
                </a>
            </div>
        </div>
    </div>

    <script>
        async function extractVideo() {
            const url = document.getElementById("urlInput").value.trim();
            if (!url) return alert("Please enter a URL.");

            const res = await fetch("/api/extract", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url })
            });

            const data = await res.json();
            if (data.error) {
                alert("Error: " + data.error);
                return;
            }

            document.getElementById("videoBtn").href = data.video;
            document.getElementById("thumbBtn").href = data.thumbnail;

            document.getElementById("results").classList.remove("hidden");
        }
    </script>
</body>

</html>
