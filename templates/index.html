<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bluesky Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white shadow-xl rounded-xl p-8 max-w-xl w-full">
        <h1 class="text-3xl font-bold text-blue-700 text-center mb-4">
            Bluesky Video Downloader
        </h1>

        <p class="text-sm text-gray-600 text-center mb-6">
            Paste any public Bluesky post URL and get clean direct links for the video and its thumbnail.
        </p>

        <div>
            <label class="block font-semibold text-blue-700 mb-2">
                Bluesky Post URL
            </label>
            <input
                id="urlInput"
                type="text"
                placeholder="https://bsky.app/profile/.../post/..."
                class="w-full px-4 py-3 border rounded-lg shadow-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
            />
        </div>

        <button
            id="submitBtn"
            onclick="extractVideo()"
            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition"
        >
            Get Links
        </button>

        <div id="loader" class="hidden mt-4 text-center text-sm text-gray-500">
            Extracting video info...
        </div>

        <div
            id="errorBox"
            class="hidden mt-4 p-3 rounded-lg bg-red-100 text-red-700 text-sm"
        ></div>

        <div id="results" class="hidden mt-6">
            <a
                id="videoBtn"
                href="#"
                class="block w-full text-center bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg mb-3 font-semibold"
                download
            >
                Download Video
            </a>

            <a
                id="thumbBtn"
                href="#"
                class="block w-full text-center bg-gray-700 hover:bg-gray-800 text-white py-3 rounded-lg font-semibold"
                download
            >
                Download Thumbnail
            </a>

            <!-- AD SPACE -->
            <div
                id="adSpace"
                class="mt-6 p-4 bg-blue-100 border border-blue-300 rounded-lg text-blue-800 text-sm text-center font-semibold"
            >
                <!-- Replace this inner HTML with your affiliate banner / ad script -->
                Ad Space — Paste Your Banner Code Here
            </div>
        </div>
    </div>

    <script>
        async function extractVideo() {
            const urlInput = document.getElementById("urlInput");
            const url = urlInput.value.trim();
            const loader = document.getElementById("loader");
            const errorBox = document.getElementById("errorBox");
            const results = document.getElementById("results");
            const videoBtn = document.getElementById("videoBtn");
            const thumbBtn = document.getElementById("thumbBtn");
            const submitBtn = document.getElementById("submitBtn");

            errorBox.classList.add("hidden");
            errorBox.textContent = "";
            results.classList.add("hidden");

            if (!url) {
                errorBox.textContent = "Please enter a Bluesky post URL.";
                errorBox.classList.remove("hidden");
                return;
            }

            loader.classList.remove("hidden");
            submitBtn.disabled = true;
            submitBtn.classList.add("opacity-60", "cursor-not-allowed");

            try {
                const res = await fetch("/api/extract", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (!res.ok || data.error) {
                    throw new Error(data.error || "Unknown error");
                }

                if (!data.video_url) {
                    throw new Error("No video URL found for this post.");
                }

                videoBtn.href = data.video_url || "#";
                thumbBtn.href = data.thumbnail_url || "#";

                results.classList.remove("hidden");
            } catch (err) {
                errorBox.textContent = "Error: " + err.message;
                errorBox.classList.remove("hidden");
            } finally {
                loader.classList.add("hidden");
                submitBtn.disabled = false;
                submitBtn.classList.remove("opacity-60", "cursor-not-allowed");
            }
        }
    </script>
</body>
</html>
